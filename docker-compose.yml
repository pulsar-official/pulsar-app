# ─── Local Development Services ──────────────────────────────────────────────
# Run: docker compose up -d
# Starts Typesense (search) and n8n (automation) for local dev.
# Your Next.js app still runs with: npm run dev
#
# Services:
#   Typesense  → http://localhost:8108
#   n8n        → http://localhost:5678

services:

  # ── Typesense ────────────────────────────────────────────────────────────────
  typesense:
    image: typesense/typesense:26.0
    restart: on-failure
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-dev_local_key}
      TYPESENSE_ENABLE_CORS: "true"
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY:-dev_local_key}
      --enable-cors
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8108/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── n8n ──────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: UTC
      # Basic auth — change these before exposing to the internet
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      # Allow webhooks from your local Next.js app
      N8N_ALLOW_WEBHOOK_FROM_HOSTS: "localhost,127.0.0.1"

volumes:
  typesense_data:
  n8n_data:
